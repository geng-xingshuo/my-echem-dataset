name: Generate Echem Dataset
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib pandas pillow

      - name: Generate dataset
        run: |
          python generate_echem_dataset.py --num 50 --out generated_echem --seed 42 --zip

      - name: Show generated files
        run: ls -la generated_echem || true

      - name: Commit generated dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated_echem
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add generated dataset (50 samples)"
            git push
          fi

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated_echem
          path: generated_echem.zip
